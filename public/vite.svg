<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Brain/AI icon -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)"/>
  <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
    <!-- Neural network nodes -->
    <circle cx="35" cy="35" r="6" fill="white" opacity="0.9"/>
    <circle cx="65" cy="35" r="6" fill="white" opacity="0.9"/>
    <circle cx="50" cy="55" r="6" fill="white" opacity="0.9"/>
    <circle cx="30" cy="65" r="5" fill="white" opacity="0.7"/>
    <circle cx="70" cy="65" r="5" fill="white" opacity="0.7"/>
    <!-- Connections -->
    <line x1="35" y1="35" x2="65" y2="35" stroke="white" opacity="0.6"/>
    <line x1="35" y1="35" x2="50" y2="55" stroke="white" opacity="0.6"/>
    <line x1="65" y1="35" x2="50" y2="55" stroke="white" opacity="0.6"/>
    <line x1="50" y1="55" x2="30" y2="65" stroke="white" opacity="0.6"/>
    <line x1="50" y1="55" x2="70" y2="65" stroke="white" opacity="0.6"/>
  </g>
</svg>
